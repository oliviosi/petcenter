name: Frontend contract + e2e

on:
  push:
    paths:
      - 'apps/frontend/**'
      - 'openspec/changes/finalize-frontend-domain-notifications/**'

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: |
          cd apps/frontend
          npm ci
      - name: Run Vitest contract
        run: |
          cd apps/frontend
          npm run test --silent

  e2e:
    runs-on: ubuntu-latest
    needs: contract
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: |
          cd apps/frontend
          npm ci
      - name: Run Playwright e2e (placeholder)
        run: |
          echo "Run Playwright e2e against STAGING_FRONTEND_URL when configured"